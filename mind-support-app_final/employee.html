<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工工作台 - 心智障碍群体就业支持</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .employee-header {
      text-align: center;
      padding: 16px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .employee-header .greeting {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .employee-header .date-info {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .level-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ---- 3步引导流程 ---- */
    .step-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .step-flow-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-primary);
      border: 3px solid transparent;
      min-width: 160px;
      min-height: 180px;
      flex: 1;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .step-flow-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .step-flow-item:active {
      transform: scale(0.97);
    }

    .step-flow-item.step-assessment {
      border-color: #E6F7FF;
    }
    .step-flow-item.step-assessment:hover {
      border-color: var(--primary);
      background: #F0F9FF;
    }

    .step-flow-item.step-training {
      border-color: #F9F0FF;
    }
    .step-flow-item.step-training:hover {
      border-color: #722ED1;
      background: #F8F0FF;
    }

    .step-flow-item.step-workflow {
      border-color: #F6FFED;
    }
    .step-flow-item.step-workflow:hover {
      border-color: var(--secondary);
      background: #F0FFF0;
    }

    .step-flow-item .step-icon {
      font-size: 3.5rem;
      margin-bottom: 10px;
      line-height: 1;
    }

    .step-flow-item .step-label {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
    }

    .step-flow-item .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .step-flow-item.step-training .step-num {
      background: #722ED1;
    }

    .step-flow-item.step-workflow .step-num {
      background: var(--secondary);
    }

    .step-flow-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--text-light);
      padding: 0 8px;
      flex-shrink: 0;
      animation: arrowBounce 1.5s ease-in-out infinite;
    }

    @keyframes arrowBounce {
      0%, 100% {
        transform: translateX(0);
        opacity: 0.5;
      }
      50% {
        transform: translateX(6px);
        opacity: 1;
      }
    }

    /* ---- 子页面容器 ---- */
    .sub-page {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .sub-page.active {
      display: block;
    }

    .sub-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .sub-header .back-btn {
      margin-bottom: 0;
    }

    .sub-header h2 {
      font-size: 1.4rem;
      color: var(--primary);
    }

    /* ---- 员工端评估界面 ---- */
    .assessment-intro {
      text-align: center;
      padding: 32px;
    }

    .assessment-intro .intro-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .assessment-intro h2 {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .assessment-intro p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 24px;
    }

    .test-type-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 500px;
      margin: 0 auto;
    }

    .test-type-card {
      padding: 24px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 3px solid #E8E8E8;
    }

    .test-type-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .test-type-card .test-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .test-type-card .test-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ---- 评估结果页面 ---- */
    .result-container {
      text-align: center;
      padding: 32px;
    }

    .result-container .result-emoji {
      font-size: 5rem;
      margin-bottom: 16px;
    }

    .result-container h2 {
      font-size: 1.6rem;
      margin-bottom: 12px;
    }

    .result-container .result-text {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 24px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .result-scores {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin: 24px 0;
    }

    .result-score-item {
      text-align: center;
    }

    .result-score-item .score-num {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    .result-score-item .score-name {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .result-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 24px;
    }

    /* ---- 沟通辅助 ---- */
    .comm-section {
      margin-bottom: 32px;
    }

    .comm-section h3 {
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 16px;
      text-align: center;
    }

    .emotion-display {
      text-align: center;
      padding: 24px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      min-height: 120px;
    }

    .emotion-display .current-emotion {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    .emotion-display .emotion-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .need-display {
      text-align: center;
      padding: 24px;
      background: var(--bg-warm);
      border-radius: var(--radius-md);
      margin-top: 16px;
      min-height: 100px;
    }

    .need-display .current-need {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    .need-display .need-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .send-btn-container {
      text-align: center;
      margin-top: 24px;
    }

    /* ---- 工作计时器 ---- */
    .workflow-timer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .workflow-timer .timer-label {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .workflow-timer .timer-display {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      background: var(--bg-main);
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      min-width: 160px;
      text-align: center;
    }

    .workflow-timer .timer-controls {
      display: flex;
      gap: 8px;
    }

    .workflow-timer .timer-controls .timer-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 2px solid var(--primary);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--primary);
    }

    .workflow-timer .timer-controls .timer-btn:hover {
      background: var(--primary);
      color: white;
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-start {
      border-color: var(--secondary);
      color: var(--secondary);
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-start:hover {
      background: var(--secondary);
      color: white;
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-pause {
      border-color: var(--warning);
      color: var(--warning);
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-pause:hover {
      background: var(--warning);
      color: white;
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-reset {
      border-color: var(--danger);
      color: var(--danger);
    }

    .workflow-timer .timer-controls .timer-btn.btn-timer-reset:hover {
      background: var(--danger);
      color: white;
    }

    /* ---- 浮动沟通按钮 ---- */
    .floating-comm-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px 12px 16px;
      border-radius: 40px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(74, 144, 217, 0.45);
      transition: all 0.3s;
      z-index: 1000;
      border: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      animation: commBtnPulse 2.5s ease-in-out infinite;
    }

    .floating-comm-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 40px rgba(74, 144, 217, 0.55);
    }

    .floating-comm-btn:active {
      transform: scale(0.96);
    }

    .floating-comm-btn .comm-btn-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .floating-comm-btn .comm-btn-text {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    @keyframes commBtnPulse {
      0%, 100% {
        box-shadow: 0 6px 28px rgba(74, 144, 217, 0.45);
      }
      50% {
        box-shadow: 0 6px 40px rgba(74, 144, 217, 0.7), 0 0 0 8px rgba(74, 144, 217, 0.12);
      }
    }

    /* ---- 首次引导提示气泡 ---- */
    .comm-guide-tip {
      position: fixed;
      bottom: 110px;
      right: 24px;
      background: white;
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      z-index: 1001;
      max-width: 260px;
      animation: tipFadeIn 0.5s ease;
      border: 2px solid var(--primary);
    }

    .comm-guide-tip .tip-arrow {
      position: absolute;
      bottom: -10px;
      right: 40px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid var(--primary);
    }

    .comm-guide-tip .tip-content {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .comm-guide-tip .tip-content .tip-highlight {
      color: var(--primary);
    }

    .comm-guide-tip .tip-close {
      display: block;
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: 4px 0;
    }

    .comm-guide-tip .tip-close:hover {
      color: var(--primary);
    }

    @keyframes tipFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- 沟通辅助浮层 ---- */
    .comm-overlay {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 560px;
      height: 100vh;
      background: var(--bg-card);
      box-shadow: -4px 0 32px rgba(0, 0, 0, 0.2);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .comm-overlay.open {
      transform: translateX(0);
    }

    .comm-overlay.hidden {
      display: none;
    }

    .comm-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--primary);
      color: white;
      flex-shrink: 0;
    }

    .comm-overlay-header h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0;
    }

    .comm-overlay-header .header-desc {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .comm-overlay-header button {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .comm-overlay-header button:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .comm-overlay-body {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
    }

    .comm-overlay-body .comm-section {
      margin-bottom: 28px;
    }

    .comm-overlay-body .comm-section h3 {
      font-size: 1.15rem;
      margin-bottom: 14px;
    }

    /* ---- 工作流程员工视图 ---- */
    .workflow-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .workflow-card .workflow-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .workflow-card .workflow-title .wf-icon {
      font-size: 2rem;
    }

    .workflow-card .workflow-title h3 {
      font-size: 1.2rem;
    }

    .step-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--bg-main);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      transition: all 0.3s;
      border-left: 5px solid #E8E8E8;
    }

    .step-card.current {
      border-left-color: var(--primary);
      background: var(--bg-cool);
      animation: pulse 2s infinite;
    }

    .step-card.done {
      border-left-color: var(--success);
      opacity: 0.6;
    }

    .step-card .step-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-card.done .step-num {
      background: var(--success);
    }

    .step-card .step-info {
      flex: 1;
    }

    .step-card .step-info .step-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .step-card .step-info .step-hint {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .step-card .step-emoji {
      font-size: 1.8rem;
    }

    .step-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    /* ---- 训练员工视图 ---- */
    .training-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.3s;
      border: 3px solid transparent;
    }

    .training-card:hover {
      border-color: #722ED1;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .training-card .training-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .training-card .training-title .tr-icon {
      font-size: 2rem;
    }

    .training-card .training-title h3 {
      font-size: 1.2rem;
    }

    .training-card .training-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* ---- 训练进行中界面 ---- */
    .training-session {
      text-align: center;
    }

    .training-session .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .training-session .session-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
    }

    .training-session .step-progress {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .training-visual {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 48px 24px;
      margin: 24px 0;
      box-shadow: var(--shadow-md);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .training-visual .visual-icon {
      font-size: 6rem;
      margin-bottom: 16px;
    }

    .training-visual .visual-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .training-visual .visual-hint {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 400px;
    }

    .training-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 24px;
    }

    /* ---- 浮层遮罩 ---- */
    .comm-overlay-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1050;
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }

    .comm-overlay-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      .step-flow {
        flex-direction: column;
        gap: 0;
      }

      .step-flow-arrow {
        transform: rotate(90deg);
        padding: 8px 0;
        animation-name: arrowBounceDown;
      }

      @keyframes arrowBounceDown {
        0%, 100% {
          transform: rotate(90deg) translateX(0);
          opacity: 0.5;
        }
        50% {
          transform: rotate(90deg) translateX(6px);
          opacity: 1;
        }
      }

      .step-flow-item {
        min-width: unset;
        width: 100%;
        max-width: 320px;
      }

      .test-type-grid {
        grid-template-columns: 1fr;
      }

      .result-scores {
        flex-direction: column;
        gap: 16px;
      }

      .result-buttons {
        flex-direction: column;
      }

      .workflow-timer {
        flex-direction: column;
        gap: 12px;
      }

      .comm-overlay {
        max-width: 100%;
      }

      .floating-comm-btn {
        bottom: 20px;
        right: 16px;
        padding: 10px 16px 10px 14px;
      }

      .floating-comm-btn .comm-btn-text {
        font-size: 0.9rem;
      }

      .comm-guide-tip {
        right: 12px;
        bottom: 100px;
        max-width: 220px;
      }

      .comm-guide-tip .tip-content {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- ===== 主页面 ===== -->
    <div id="mainPage" class="sub-page active">
      <div class="employee-header">
        <div class="greeting">👋 你好！</div>
        <div class="date-info" id="dateInfo"></div>
        <div id="levelBadge" class="level-indicator level-mid">⭐ 中级</div>
      </div>

      <div class="step-flow">
        <div class="step-flow-item step-assessment" onclick="navigateTo('assessmentPage', 1)">
          <span class="step-num">1</span>
          <span class="step-icon">📋</span>
          <div class="step-label">状态评估</div>
        </div>
        <div class="step-flow-arrow">➡</div>
        <div class="step-flow-item step-training" onclick="navigateTo('trainingPage', 2)">
          <span class="step-num">2</span>
          <span class="step-icon">🎯</span>
          <div class="step-label">岗位训练</div>
        </div>
        <div class="step-flow-arrow">➡</div>
        <div class="step-flow-item step-workflow" onclick="navigateTo('workflowPage', 3)">
          <span class="step-num">3</span>
          <span class="step-icon">📦</span>
          <div class="step-label">工作流程</div>
        </div>
      </div>
    </div>

    <!-- ===== 评估页面 ===== -->
    <div id="assessmentPage" class="sub-page">
      <div class="sub-header">
        <button class="back-btn" onclick="navigateTo('mainPage', 0)">← 返回</button>
        <h2>📋 状态评估</h2>
      </div>

      <!-- 评估介绍 -->
      <div id="assessmentIntro" class="assessment-intro">
        <div class="intro-icon">🌟</div>
        <h2>让我们来了解一下你的能力</h2>
        <p>共5个板块，总分100分，按顺序完成</p>
        <div class="test-type-grid" style="grid-template-columns: repeat(3, 1fr); max-width:600px;">
        </div>
      </div>

      <!-- 评估进行中 -->
      <div id="assessmentTest" class="hidden">
        <div style="text-align:center; margin-bottom:16px;">
          <span id="testTitle" style="font-size:1.3rem; font-weight:700; color:var(--primary);"></span>
        </div>
        <div class="progress-bar">
          <div id="testProgress" class="progress-fill" style="width:0%"></div>
        </div>
        <div id="testContent" class="assessment-area"></div>
      </div>

      <!-- 评估结果 -->
      <div id="assessmentResult" class="hidden result-container">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 id="resultTitle">评估完成！</h2>
        <p class="result-text" id="resultText"></p>
        <div class="result-scores" id="resultScores"></div>
        <div id="resultLevel" style="margin: 16px 0;"></div>
        <div class="result-buttons">
          <button class="btn btn-primary" onclick="navigateTo('mainPage', 0)">🏠 回到首页</button>
          <button class="btn btn-outline" onclick="resetAssessment()">🔄 重新评估</button>
        </div>
      </div>
    </div>

    <!-- ===== 工作流程页面 ===== -->
    <div id="workflowPage" class="sub-page">
      <div class="sub-header">
        <button class="back-btn" onclick="navigateTo('mainPage', 0)">← 返回</button>
        <h2>📦 工作流程</h2>
      </div>

      <!-- 工作计时器 -->
      <div class="workflow-timer">
        <div class="timer-label">⏱️ 工作计时</div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-controls">
          <button class="timer-btn btn-timer-start" id="timerStartBtn" onclick="startWorkTimer()" title="开始计时">▶</button>
          <button class="timer-btn btn-timer-pause" id="timerPauseBtn" onclick="pauseWorkTimer()" title="暂停计时">⏸</button>
          <button class="timer-btn btn-timer-reset" id="timerResetBtn" onclick="resetWorkTimer()" title="重置计时">⏹</button>
        </div>
      </div>

      <div id="workflowList"></div>
    </div>

    <!-- ===== 岗位训练页面 ===== -->
    <div id="trainingPage" class="sub-page">
      <div class="sub-header">
        <button class="back-btn" onclick="navigateTo('mainPage', 0)">← 返回</button>
        <h2>🎯 岗位训练</h2>
      </div>

      <div id="trainingList"></div>

      <div id="trainingSession" class="hidden training-session">
        <div class="session-header">
          <span class="session-title" id="sessionTitle"></span>
          <span class="step-progress" id="sessionProgress"></span>
        </div>
        <div class="progress-bar">
          <div id="trainingProgress" class="progress-fill" style="width:0%"></div>
        </div>
        <div class="training-visual">
          <div id="trainingAnimArea" style="width:100%; margin-bottom:16px;"></div>
          <div class="visual-icon" id="visualIcon"></div>
          <div class="visual-title" id="visualTitle"></div>
          <div class="visual-hint" id="visualHint"></div>
        </div>
        <div class="training-actions">
          <button class="btn btn-outline" id="prevStepBtn" onclick="trainingPrevStep()">⬅ 上一步</button>
          <button class="btn btn-primary" id="nextStepBtn" onclick="trainingNextStep()">下一步 ➡</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Floating Communication Button -->
  <div id="floatingCommBtn" class="floating-comm-btn" onclick="toggleCommPanel()" style="display:none;">
    <span class="comm-btn-icon">💬</span>
    <span class="comm-btn-text">沟通辅助</span>
  </div>

  <!-- 首次引导提示气泡 -->
  <div id="commGuideTip" class="comm-guide-tip" style="display:none;">
    <div class="tip-arrow"></div>
    <div class="tip-content">
      👋 工作中想表达感受？<br>
      点击下方 <span class="tip-highlight">「沟通辅助」</span> 按钮<br>
      可以告诉辅导员你的心情和需求
    </div>
    <button class="tip-close" onclick="dismissGuideTip()">我知道了</button>
  </div>

  <!-- Communication Overlay Backdrop -->
  <div id="commOverlayBackdrop" class="comm-overlay-backdrop" onclick="toggleCommPanel()"></div>

  <!-- Communication Overlay Panel -->
  <div id="commOverlay" class="comm-overlay hidden">
    <div class="comm-overlay-header">
      <div>
        <h3>💬 沟通辅助</h3>
        <div class="header-desc">告诉辅导员你的感受和需求</div>
      </div>
      <button onclick="toggleCommPanel()">✕</button>
    </div>
    <div class="comm-overlay-body">
      <div class="comm-section">
        <h3>😊 你现在感觉怎么样？</h3>
        <div id="floatingEmotionGrid" class="emotion-grid"></div>
        <div id="floatingEmotionDisplay" class="emotion-display hidden">
          <div class="current-emotion" id="floatingCurrentEmotion"></div>
          <div class="emotion-text" id="floatingEmotionText"></div>
        </div>
      </div>
      <div class="comm-section">
        <h3>🆘 你需要什么？</h3>
        <div id="floatingNeedsGrid" class="needs-grid"></div>
        <div id="floatingNeedDisplay" class="need-display hidden">
          <div class="current-need" id="floatingCurrentNeed"></div>
          <div class="need-text" id="floatingNeedText"></div>
        </div>
      </div>
      <div class="send-btn-container">
        <button id="floatingSendCommBtn" class="btn btn-primary btn-large hidden" onclick="sendFloatingCommunication()">
          📤 告诉辅导员
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/assessment.js"></script>
  <script src="js/workflow.js"></script>
  <script src="js/communication.js"></script>
  <script src="js/training.js"></script>
  <script>
    // ---- 页面导航（带顺序引导） ----
    function navigateTo(pageId, stepOrder) {
      // 检查顺序并给出友好提示
      const completedSteps = getCompletedSteps();
      if (stepOrder === 2 && !completedSteps.assessment) {
        App.toast('💡 建议先完成「状态评估」，了解你的能力水平哦', 'info');
      } else if (stepOrder === 3 && !completedSteps.training) {
        App.toast('💡 建议先完成「岗位训练」，练习一下工作技能', 'info');
      }
      document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      App.playSound('click');

      // 根据页面显示/隐藏浮动沟通按钮
      const commBtn = document.getElementById('floatingCommBtn');
      if (commBtn) {
        commBtn.style.display = pageId === 'workflowPage' ? 'flex' : 'none';
      }

      // 进入工作流程页面时显示引导提示
      if (pageId === 'workflowPage') {
        setTimeout(() => showGuideTip(), 1200);
      }
    }

    function getCompletedSteps() {
      const assessmentData = App.store.get('assessment_result', null);
      const trainingStatus = App.store.get('training_completed', {});
      return {
        assessment: !!assessmentData,
        training: Object.keys(trainingStatus).length > 0
      };
    }

    // ---- 浮动沟通面板 ----
    let commPanelOpen = false;
    let floatingSelectedEmotion = null;
    let floatingSelectedNeed = null;

    function toggleCommPanel() {
      const overlay = document.getElementById('commOverlay');
      const backdrop = document.getElementById('commOverlayBackdrop');
      commPanelOpen = !commPanelOpen;

      if (commPanelOpen) {
        overlay.classList.remove('hidden');
        // Force reflow before adding open class for transition
        void overlay.offsetWidth;
        overlay.classList.add('open');
        backdrop.classList.add('visible');
        // 关闭引导提示
        dismissGuideTip();
      } else {
        overlay.classList.remove('open');
        backdrop.classList.remove('visible');
        setTimeout(() => {
          if (!commPanelOpen) overlay.classList.add('hidden');
        }, 350);
      }
      App.playSound('click');
    }

    // ---- 首次引导提示 ----
    let guideTipDismissed = false;

    function showGuideTip() {
      if (guideTipDismissed) return;
      // 检查是否已经看过引导
      if (App.store.get('comm_guide_shown', false)) {
        guideTipDismissed = true;
        return;
      }
      const tip = document.getElementById('commGuideTip');
      if (tip) {
        tip.style.display = 'block';
        // 8秒后自动消失
        setTimeout(() => {
          dismissGuideTip();
        }, 8000);
      }
    }

    function dismissGuideTip() {
      guideTipDismissed = true;
      const tip = document.getElementById('commGuideTip');
      if (tip) {
        tip.style.display = 'none';
      }
      App.store.set('comm_guide_shown', true);
    }

    function initFloatingComm() {
      const emotions = App.getEmotions();
      const needs = App.getNeeds();

      // 渲染情绪网格
      const emotionGrid = document.getElementById('floatingEmotionGrid');
      if (emotionGrid) {
        emotionGrid.innerHTML = emotions.map(em => `
          <div class="emotion-card" onclick="selectFloatingEmotion('${em.id}')" id="floating-emotion-${em.id}">
            <span class="emoji">${em.emoji}</span>
            <span class="emotion-label">${em.label}</span>
          </div>
        `).join('');
      }

      // 渲染需求网格
      const needsGrid = document.getElementById('floatingNeedsGrid');
      if (needsGrid) {
        needsGrid.innerHTML = needs.map(need => `
          <div class="need-card" onclick="selectFloatingNeed('${need.id}')" id="floating-need-${need.id}">
            <span class="need-icon">${need.icon}</span>
            <span class="need-label">${need.label}</span>
          </div>
        `).join('');
      }
    }

    function selectFloatingEmotion(id) {
      const emotions = App.getEmotions();
      const emotion = emotions.find(e => e.id === id);
      if (!emotion) return;

      // 更新选中状态
      document.querySelectorAll('#commOverlay .emotion-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(`floating-emotion-${id}`).classList.add('selected');

      floatingSelectedEmotion = emotion;

      // 显示选中的情绪
      const display = document.getElementById('floatingEmotionDisplay');
      display.classList.remove('hidden');
      document.getElementById('floatingCurrentEmotion').textContent = emotion.emoji;
      document.getElementById('floatingEmotionText').textContent = `我现在感觉：${emotion.label}`;

      App.playSound('click');
      checkFloatingCanSend();
    }

    function selectFloatingNeed(id) {
      const needs = App.getNeeds();
      const need = needs.find(n => n.id === id);
      if (!need) return;

      // 更新选中状态
      document.querySelectorAll('#commOverlay .need-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(`floating-need-${id}`).classList.add('selected');

      floatingSelectedNeed = need;

      // 显示选中的需求
      const display = document.getElementById('floatingNeedDisplay');
      display.classList.remove('hidden');
      document.getElementById('floatingCurrentNeed').textContent = need.icon;
      document.getElementById('floatingNeedText').textContent = `我需要：${need.label}`;

      App.playSound('click');
      checkFloatingCanSend();
    }

    function checkFloatingCanSend() {
      const btn = document.getElementById('floatingSendCommBtn');
      if (floatingSelectedEmotion) {
        btn.classList.remove('hidden');
      }
    }

    function sendFloatingCommunication() {
      if (!floatingSelectedEmotion) {
        App.toast('请先选择你的感受', 'warning');
        return;
      }

      const emotionText = floatingSelectedEmotion.label;
      const needText = floatingSelectedNeed ? floatingSelectedNeed.label : '无';

      // 保存到历史记录
      const history = App.store.get('history', []);
      history.unshift({
        name: '员工',
        action: '发送沟通需求',
        detail: `情绪：${emotionText} | 需求：${needText}`,
        time: new Date().toLocaleString('zh-CN')
      });
      App.store.set('history', history.slice(0, 50));

      // 显示成功提示
      App.showModal({
        icon: '✅',
        title: '已发送！',
        content: `
          <div style="text-align:center; padding:16px;">
            <div style="font-size:3rem; margin-bottom:12px;">${floatingSelectedEmotion.emoji}</div>
            <p style="font-size:1.1rem; margin-bottom:8px;">辅导员已经收到你的消息</p>
            <p style="color:var(--text-secondary);">
              ${floatingSelectedNeed ? `你的需求「${needText}」已记录` : '稍后会有辅导员来帮助你'}
            </p>
          </div>
        `,
        buttons: [
          { text: '好的 👍', type: 'primary', onClick: () => {
            resetFloatingSelection();
          }}
        ]
      });

      App.playSound('success');
    }

    function resetFloatingSelection() {
      floatingSelectedEmotion = null;
      floatingSelectedNeed = null;

      document.querySelectorAll('#commOverlay .emotion-card').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('#commOverlay .need-card').forEach(c => c.classList.remove('selected'));

      document.getElementById('floatingEmotionDisplay').classList.add('hidden');
      document.getElementById('floatingNeedDisplay').classList.add('hidden');
      document.getElementById('floatingSendCommBtn').classList.add('hidden');
    }

    // ---- 工作计时器（控制Workflow对象计时器） ----
    function startWorkTimer() {
      if (typeof Workflow !== 'undefined') {
        Workflow.startTimer();
      }
      App.playSound('click');
    }

    function pauseWorkTimer() {
      if (typeof Workflow !== 'undefined') {
        Workflow.pauseTimer();
      }
      App.playSound('click');
    }

    function resetWorkTimer() {
      if (typeof Workflow !== 'undefined') {
        Workflow.resetTimer();
      }
      App.playSound('click');
    }

    function updateTimerDisplay() {
      if (typeof Workflow !== 'undefined') {
        Workflow.updateTimerDisplay();
      }
    }

    // ---- 初始化 ----
    function init() {
      // 显示日期
      const now = new Date();
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      document.getElementById('dateInfo').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;

      // 显示等级
      updateLevelBadge();

      // 初始化评估模块（同步已完成状态）
      if (typeof Assessment !== 'undefined' && Assessment.init) {
        Assessment.init();
      }

      // 初始化各模块
      initWorkflow();
      initTraining();

      // 初始化浮动沟通面板
      initFloatingComm();

      // 初始化评估页面UI（显示锁定/完成状态）
      if (typeof Assessment !== 'undefined' && Assessment.updateIntroUI) {
        Assessment.updateIntroUI();
      }
    }

    function updateLevelBadge() {
      const level = App.getUserLevel();
      const badge = document.getElementById('levelBadge');
      const icons = { low: '🌱', medium: '⭐', high: '🏆' };
      badge.className = `level-indicator level-${level.id === 'medium' ? 'mid' : level.id}`;
      badge.textContent = `${icons[level.id]} ${level.name}`;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
